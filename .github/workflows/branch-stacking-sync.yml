name: Branch Stacking Auto Sync
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Check upstream updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git remote add upstream ${UPSTREAM_URL} || true
          git fetch upstream

          # 计算上游新提交数
          BEHIND=$(git rev-list --count main..upstream/main)
          
          if [ "$BEHIND" -gt 0 ]; then
            echo "上游有 $BEHIND 个新提交"
            
            # 获取新提交列表
            COMMITS=$(git log --oneline main..upstream/main | head -20)
            
            # 创建 issue 通知
            gh issue create \
              --title "[Sync] 上游有 $BEHIND 个新提交待合并" \
              --body "## 上游更新通知\n\njiujiu532/grok2api 有 **$BEHIND** 个新提交。\n\n### 最近提交\n\`\`\`\n$COMMITS\n\`\`\`\n\n### 合并方法\n\`\`\`bash\n# 方式1: 自动合并（推荐）\nsh .agents/skills/branch-stacking-maintenance/scripts/bsm.sh cascade-sync\n\n# 方式2: 手动合并\ngit fetch jiujiu532\ngit merge jiujiu532/main\n\`\`\`" \
              --label "upstream-sync" || true
          else
            echo "上游无新提交"
          fi

env:
  UPSTREAM_URL: ${{ vars.UPSTREAM_URL }}
