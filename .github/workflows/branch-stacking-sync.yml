name: Branch Stacking Auto Sync
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Update upstream mirror branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # 只更新 upstream/active 镜像分支，不覆盖 main
          git remote add upstream ${UPSTREAM_URL} || true
          git fetch upstream
          
          # 强制更新 upstream/active 分支指向活跃上游
          git branch -f upstream/active upstream/main
          git push origin upstream/active --force

      - name: Notify if updates available
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 检查 main 和上游是否有差异
          BEHIND=$(git rev-list --count main..upstream/active)
          if [ "$BEHIND" -gt 0 ]; then
            echo "上游有 $BEHIND 个新提交待合并"
            # 创建 issue 提醒（而不是自动覆盖 main）
            gh issue create \
              --title "[Auto] 上游有 $BEHIND 个新提交" \
              --body "活跃上游 jiujiu532/grok2api 有 $BEHIND 个新提交。\n\n手动合并：\n\`\`\`bash\ngit fetch jiujiu532\ngit branch -f upstream/active jiujiu532/main\ngit checkout main\ngit merge upstream/active\n\`\`\`" \
              --label "upstream-sync" || true
          else
            echo "上游无新提交"
          fi

env:
  UPSTREAM_URL: ${{ vars.UPSTREAM_URL }}
